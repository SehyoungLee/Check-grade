<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2학년 진단평가 결과 조회</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background-color: #f2f2f7; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 25px; }
        .nav-buttons button { flex: 1; padding: 12px; background: #e5e5ea; color: #3a3a3c; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .nav-buttons button.active { background: #007aff; color: white; }
        h2 { text-align: center; color: #1c1c1e; margin-bottom: 20px; }
        .input-box { margin-bottom: 15px; }
        label { display: block; font-size: 0.85em; color: #8e8e93; margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 14px; border: 1px solid #d1d1d6; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .main-btn { width: 100%; padding: 16px; background-color: #007aff; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        
        #result, #teacherSection { margin-top: 25px; display: none; border-top: 1px solid #e5e5ea; padding-top: 20px; }
        .score-row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f2f2f7; }
        .avg-box { color: #ff3b30; font-weight: bold; font-size: 1.1em; border-top: 2px solid #f2f2f7; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #e5e5ea; padding: 8px 4px; text-align: center; }
        th { background-color: #f2f2f7; color: #007aff; cursor: pointer; min-width: 40px; }
        .stats-card { background: #f2f2f7; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; color: #007aff; }
        .low-score { color: #ff3b30; font-weight: bold; }

        /* 🚩 로그아웃 버튼 스타일 */
        .logout-btn { background-color: #8e8e93; color: white; padding: 8px 15px; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; float: right; margin-bottom: 10px; }
        .teacher-header { overflow: hidden; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-buttons">
        <button id="btnStudent" class="active" onclick="showPage('student')">학생 조회</button>
        <button id="btnTeacher" onclick="showPage('teacher')">담임 관리</button>
    </div>

    <div id="studentPage">
        <h2>📊 진단평가 조회</h2>
        <div class="input-box"><label>반</label><input type="number" id="classInput" pattern="\d*" placeholder="반"></div>
        <div class="input-box"><label>번호</label><input type="number" id="numInput" pattern="\d*" placeholder="번호"></div>
        <button class="main-btn" onclick="searchScore()">결과 확인</button>
        <div id="result">
            <h3 id="studentTitle" style="text-align:center;"></h3>
            <div id="scoreDisplay"></div>
        </div>
    </div>

    <div id="teacherPage" style="display:none;">
        <div class="teacher-header">
            <h2 id="teacherTitle" style="display:inline-block; margin:0;">🔐 담임 관리 모드</h2>
            <button id="btnLogout" class="logout-btn" style="display:none;" onclick="logoutAdmin()">나가기</button>
        </div>
        
        <div id="adminAuth">
            <div class="input-box"><label>관리자 암호</label><input type="password" id="adminPw" placeholder="암호 입력"></div>
            <button class="main-btn" onclick="authAdmin()">로그인</button>
        </div>

        <div id="teacherSection">
            <div class="stats-card" id="classStats"></div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable('번호')">번호</th>
                            <th onclick="sortTable('국어')">국어</th>
                            <th onclick="sortTable('수학')">수학</th>
                            <th onclick="sortTable('영어')">영어</th>
                            <th onclick="sortTable('사회')">사회</th>
                            <th onclick="sortTable('과학')">과학</th>
                            <th onclick="sortTable('평균')">평균</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

            const subs = ['국어', '수학', '영어', '사회', '과학'];
            let html = '';
            subs.forEach(sub => { html += `<div class="score-row"><span>${sub}</span><span>${student[sub] || 0}점</span></div>`; });
            html += `<div class="score-row avg-box"><span>평균</span><span>${student['평균']}점</span></div>`;
            document.getElementById('scoreDisplay').innerHTML = html;
            document.getElementById('result').style.display = 'block';
        } else { alert("정보를 찾을 수 없습니다."); }
    }

    function authAdmin() {
        const inputPw = document.getElementById('adminPw').value;
        let targetBan = Object.keys(ADMIN_KEYS).find(key => ADMIN_KEYS[key] === inputPw);
        if (targetBan) {
            document.getElementById('adminAuth').style.display = 'none';
            document.getElementById('teacherSection').style.display = 'block';
            document.getElementById('btnLogout').style.display = 'inline-block'; // 나가기 버튼 표시
            document.getElementById('teacherTitle').innerText = `👨‍🏫 ${targetBan}반 관리`;
            
            currentViewData = studentData.filter(s => String(s['반']) === targetBan);
            renderTable(currentViewData);
            const avg = (currentViewData.reduce((a, b) => a + Number(b.평균), 0) / currentViewData.length).toFixed(2);
            document.getElementById('classStats').innerText = `${targetBan}반 평균: ${avg}점 (${currentViewData.length}명)`;
        } else { alert("암호가 틀렸습니다."); }
    }

    // 🚩 로그아웃 함수 추가
    function logoutAdmin() {
        document.getElementById('adminAuth').style.display = 'block';
        document.getElementById('teacherSection').style.display = 'none';
        document.getElementById('btnLogout').style.display = 'none';
        document.getElementById('teacherTitle').innerText = `🔐 담임 관리 모드`;
        document.getElementById('adminPw').value = ''; // 입력했던 암호 초기화
        currentViewData = [];
    }

    function renderTable(data) {
        document.getElementById('tableBody').innerHTML = data.map(s => {
            const format = (val) => Number(val) < 10 ? `<span class="low-score">${val}</span>` : val;
            return `<tr><td>${s.번호}</td><td>${format(s.국어)}</td><td>${format(s.수학)}</td><td>${format(s.영어)}</td><td>${format(s.사회)}</td><td>${format(s.과학)}</td><td><strong>${s.평균}</strong></td></tr>`;
        }).join('');
    }

    function sortTable(key) {
        currentSort.asc = (currentSort.key === key) ? !currentSort.asc : true;
        currentSort.key = key;
        currentViewData.sort((a, b) => {
            let vA = Number(a[key]) || 0;
            let vB = Number(b[key]) || 0;
            return currentSort.asc ? vA - vB : vB - vA;
        });
        renderTable(currentViewData);
    }
</script>
</body>
</html>
